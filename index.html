<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Carte des Stades Ligue 1</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #map { flex: 2; width: 100%; border-bottom: 2px solid #ccc; }
        #matchs-container { flex: 1; padding: 20px; overflow-y: auto; background: #f9f9f9; }
        .match-card { border-bottom: 1px solid #ddd; padding: 10px; display: flex; justify-content: space-between; }
        .score { font-weight: bold; color: #2c3e50; }
    </style>
</head>
<body>

    <div id="map"></div>
    <div id="matchs-container">
        <h2 id="stade-nom">Cliquez sur un stade sur la carte</h2>
        <div id="liste-matchs"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
