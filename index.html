<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ligue 1 - Carte Interactive</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: #1a2a6c; color: white; padding: 10px; text-align: center; }
        #map { flex: 2; width: 100%; background: #aad3df; }
        #matchs-container { flex: 1; padding: 15px; overflow-y: auto; background: white; border-top: 4px solid #fdbb2d; }
        .match-card { border-bottom: 1px solid #eee; padding: 8px; display: flex; justify-content: space-between; }
        .score { background: #1a2a6c; color: white; padding: 2px 8px; border-radius: 4px; font-weight: bold; }
        .error { color: #d9534f; font-size: 0.9em; text-align: center; }
    </style>
</head>
<body>

<header><h1>Ligue 1 Interactive 2026</h1></header>
<div id="map"></div>
<div id="matchs-container">
    <h2 id="stade-nom">Sélectionnez un club</h2>
    <div id="liste-matchs">Chargement...</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // 1. CONFIG
    const API_KEY = '42ddec7c6cd54e0786b0444e2001c25e';
    const STADES_GPS = {
        "PSG": [48.8414, 2.2530], "OM": [43.2698, 5.3959], "OL": [45.7653, 4.9819],
        "Monaco": [43.7276, 7.4155], "Lille": [50.6119, 3.1305], "Lens": [50.4328, 2.8149],
        "Rennes": [48.1075, -1.7033], "Nice": [43.7053, 7.1927], "Brest": [48.4030, -4.4614],
        "Strasbourg": [48.5603, 7.7546], "Toulouse": [43.5833, 1.4341], "Auxerre": [47.7867, 3.5880],
        "Angers": [47.4615, -0.5302], "Le Havre": [49.5002, 0.1701], "Saint-Étienne": [45.4608, 4.3901],
        "Nantes": [47.2561, -1.5247], "Paris FC": [48.8284, 2.3761], "Metz": [49.1098, 6.1590]
    };

    // 2. CARTE
    const map = L.map('map').setView([46.6, 2.2], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // 3. RECUPERATION DES DONNÉES
    async function init() {
        try {
            const res = await fetch('https://api.football-data.org/v4/competitions/FL1/teams', {
                headers: { 'X-Auth-Token': API_KEY }
            });

            if (!res.ok) throw new Error("API bloquée ou quota atteint");

            const data = await res.json();
            data.teams.forEach(team => {
                ajouterMarqueur(team.name, team.id, team.venue);
            });
            document.getElementById('liste-matchs').innerHTML = "Données API chargées.";

        } catch (err) {
            console.error(err);
            document.getElementById('liste-matchs').innerHTML = `<div class="error">Mode secours activé (API injoignable via ton proxy).</div>`;
            // MODE SECOURS : On affiche les points manuellement si l'API échoue
            Object.keys(STADES_GPS).forEach(name => {
                ajouterMarqueur(name, null, "Stade de " + name);
            });
        }
    }

    function ajouterMarqueur(nom, id, stade) {
        let coords = null;
        for (let key in STADES_GPS) {
            if (nom.includes(key)) coords = STADES_GPS[key];
        }

        if (coords) {
            const marker = L.marker(coords).addTo(map);
            marker.bindPopup(`<b>${nom}</b><br>${stade}`);
            if (id) {
                marker.on('click', () => chargerMatchs(id, nom));
            } else {
                marker.on('click', () => {
                    document.getElementById('stade-nom').innerText = nom;
                    document.getElementById('liste-matchs').innerHTML = "Matchs indisponibles en mode secours.";
                });
            }
        }
    }

    async function chargerMatchs(id, nom) {
        document.getElementById('stade-nom').innerText = nom;
        const liste = document.getElementById('liste-matchs');
        liste.innerHTML = "Chargement des matchs...";
        try {
            const res = await fetch(`https://api.football-data.org/v4/teams/${id}/matches?status=FINISHED&limit=5`, {
                headers: { 'X-Auth-Token': API_KEY }
            });
            const data = await res.json();
            liste.innerHTML = "";
            data.matches.forEach(m => {
                liste.innerHTML += `<div class="match-card">
                    <span>${new Date(m.utcDate).toLocaleDateString()}</span>
                    <span>${m.homeTeam.shortName} - ${m.awayTeam.shortName}</span>
                    <span class="score">${m.score.fullTime.home}-${m.score.fullTime.away}</span>
                </div>`;
            });
        } catch (e) {
            liste.innerHTML = "Erreur chargement matchs.";
        }
    }

    init();
</script>
</body>
</html>
