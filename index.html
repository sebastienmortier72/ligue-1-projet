<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ligue 1 - Carte Directe</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: #1a2a6c; color: white; padding: 10px; text-align: center; }
        #map { flex: 2; width: 100%; }
        #matchs { flex: 1; background: white; padding: 15px; overflow-y: auto; border-top: 3px solid #fdbb2d; }
        .match-card { border-bottom: 1px solid #eee; padding: 8px; display: flex; justify-content: space-between; }
        .score { background: #1a2a6c; color: white; padding: 2px 8px; border-radius: 4px; font-weight: bold; }
        .status-badge { font-size: 0.8em; padding: 3px; border-radius: 3px; margin-bottom: 10px; display: inline-block; }
    </style>
</head>
<body>

<header>Ligue 1 - Saison 2026</header>
<div id="map"></div>
<div id="matchs">
    <div id="api-status" class="status-badge" style="background:#eee">Vérification de la connexion...</div>
    <h2 id="stade-nom" style="margin-top:0">Cliquez sur un stade</h2>
    <div id="liste-matchs">Sélectionnez un club sur la carte pour voir les scores.</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const API_KEY = '42ddec7c6cd54e0786b0444e2001c25e';
    
    // On définit les clubs avec leurs IDs Football-Data pour lier les deux
    const CLUBS = [
        { id: 524, name: "Paris Saint-Germain", gps: [48.8414, 2.2530] },
        { id: 516, name: "Marseille", gps: [43.2698, 5.3959] },
        { id: 523, name: "Lyon", gps: [45.7653, 4.9819] },
        { id: 548, name: "Monaco", gps: [43.7276, 7.4155] },
        { id: 521, name: "Lille", gps: [50.6119, 3.1305] },
        { id: 546, name: "Lens", gps: [50.4328, 2.8149] },
        { id: 529, name: "Rennes", gps: [48.1075, -1.7033] },
        { id: 522, name: "Nice", gps: [43.7053, 7.1927] },
        { id: 512, name: "Brest", gps: [48.4030, -4.4614] },
        { id: 511, name: "Toulouse", gps: [43.5833, 1.4341] },
        { id: 527, name: "Saint-Étienne", gps: [45.4608, 4.3901] },
        { id: 543, name: "Nantes", gps: [47.2561, -1.5247] }
    ];

    // 1. INIT CARTE IMMÉDIATE
    const map = L.map('map').setView([46.6, 2.2], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // 2. PLACEMENT DES POINTS IMMÉDIAT (SANS ATTENDRE L'API)
    CLUBS.forEach(club => {
        const marker = L.marker(club.gps).addTo(map);
        marker.bindPopup(`<b>${club.name}</b>`);
        marker.on('click', () => loadMatches(club.id, club.name));
    });

    // 3. VÉRIFICATION DE L'API EN ARRIÈRE-PLAN
    async function checkAPI() {
        const status = document.getElementById('api-status');
        try {
            const res = await fetch('https://api.football-data.org/v4/competitions/FL1', {
                headers: { 'X-Auth-Token': API_KEY }
            });
            if(res.ok) {
                status.innerHTML = "✅ API Connectée";
                status.style.background = "#d4edda";
                status.style.color = "#155724";
            } else {
                throw new Error();
            }
        } catch(e) {
            status.innerHTML = "⚠️ Mode Hors-Ligne (Proxy/Réseau bloqué)";
            status.style.background = "#fff3cd";
            status.style.color = "#856404";
        }
    }

    // 4. CHARGEMENT DES MATCHS (SUR CLIC)
    async function loadMatches(id, nom) {
        document.getElementById('stade-nom').innerText = nom;
        const liste = document.getElementById('liste-matchs');
        liste.innerHTML = "Connexion à l'API...";

        try {
            const res = await fetch(`https://api.football-data.org/v4/teams/${id}/matches?status=FINISHED&limit=5`, {
                headers: { 'X-Auth-Token': API_KEY }
            });
            const data = await res.json();
            
            if (!data.matches || data.matches.length === 0) {
                liste.innerHTML = "Aucun résultat récent trouvé.";
                return;
            }

            liste.innerHTML = "";
            data.matches.forEach(m => {
                liste.innerHTML += `
                    <div class="match-card">
                        <span>${new Date(m.utcDate).toLocaleDateString()}</span>
                        <span>${m.homeTeam.shortName} - ${m.awayTeam.shortName}</span>
                        <span class="score">${m.score.fullTime.home}-${m.score.fullTime.away}</span>
                    </div>`;
            });
        } catch (err) {
            liste.innerHTML = `<b style="color:red">Erreur :</b> Impossible de récupérer les scores depuis ce réseau.`;
        }
    }

    checkAPI();
</script>
</body>
</html>
