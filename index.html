<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ligue 1 Interactive 2025/2026</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; background: #eee; }
        header { background: #1a2a6c; color: white; padding: 10px 20px; text-align: center; }
        #map { flex: 2; width: 100%; }
        #matchs-container { flex: 1; padding: 20px; overflow-y: auto; background: white; border-top: 4px solid #fdbb2d; }
        .match-card { border-bottom: 1px solid #eee; padding: 10px; display: flex; justify-content: space-between; align-items: center; }
        .score { background: #1a2a6c; color: white; padding: 3px 10px; border-radius: 4px; font-weight: bold; }
        .error-msg { color: red; font-weight: bold; text-align: center; padding: 10px; }
    </style>
</head>
<body>

    <header>
        <h1>Ligue 1 - Saison 2025/2026</h1>
    </header>

    <div id="map"></div>

    <div id="matchs-container">
        <h2 id="stade-nom">Cliquez sur un stade</h2>
        <div id="liste-matchs">Les points s'affichent si la clé API est valide...</div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // 1. CONFIGURATION (METS TA CLÉ ICI)
        const API_KEY = '42ddec7c6cd54e0786b0444e2001c25e'; 
        const COMPETITION = 'FL1'; 

        // 2. COORDONNÉES DES STADES (Noms simplifiés pour matcher plus facilement)
        const STADES_GPS = {
            "Paris Saint-Germain": [48.8414, 2.2530],
            "Marseille": [43.2698, 5.3959],
            "Lyon": [45.7653, 4.9819],
            "Monaco": [43.7276, 7.4155],
            "Lille": [50.6119, 3.1305],
            "Lens": [50.4328, 2.8149],
            "Rennes": [48.1075, -1.7033],
            "Nice": [43.7053, 7.1927],
            "Brest": [48.4030, -4.4614],
            "Strasbourg": [48.5603, 7.7546],
            "Toulouse": [43.5833, 1.4341],
            "Auxerre": [47.7867, 3.5880],
            "Angers": [47.4615, -0.5302],
            "Havre": [49.5002, 0.1701],
            "Saint-Étienne": [45.4608, 4.3901],
            "Nantes": [47.2561, -1.5247],
            "Paris FC": [48.8284, 2.3761],
            "Metz": [49.1098, 6.1590],
            "Lorient": [47.7495, -3.3694]
        };

        // 3. INITIALISATION CARTE
        const map = L.map('map').setView([46.6, 2.2], 6);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // 4. FONCTION POUR TROUVER LES COORDONNÉES (Flexible)
        function getCoords(teamName) {
            for (let key in STADES_GPS) {
                if (teamName.includes(key)) return STADES_GPS[key];
            }
            return null;
        }

        // 5. CHARGEMENT DES DONNÉES
        async function init() {
            try {
                const res = await fetch(`https://api.football-data.org/v4/competitions/${COMPETITION}/teams`, {
                    headers: { 'X-Auth-Token': API_KEY }
                });

                if (res.status === 403) {
                    document.getElementById('liste-matchs').innerHTML = "<p class='error-msg'>Erreur 403 : Clé API invalide ou accès refusé.</p>";
                    return;
                }

                const data = await res.json();
                
                data.teams.forEach(team => {
                    const coords = getCoords(team.name);
                    if (coords) {
                        const marker = L.marker(coords).addTo(map);
                        marker.bindPopup(`<b>${team.name}</b><br>${team.venue}`);
                        
                        marker.on('click', () => {
                            document.getElementById('stade-nom').innerText = team.name;
                            loadResults(team.id);
                        });
                    } else {
                        console.warn("Pas de GPS pour :", team.name);
                    }
                });

                document.getElementById('liste-matchs').innerHTML = "Carte chargée. Cliquez sur un point.";

            } catch (err) {
                console.error(err);
                document.getElementById('liste-matchs').innerHTML = "Erreur de connexion à l'API.";
            }
        }

        async function loadResults(teamId) {
            const list = document.getElementById('liste-matchs');
            list.innerHTML = "Chargement...";

            try {
                const res = await fetch(`https://api.football-data.org/v4/teams/${teamId}/matches?status=FINISHED&limit=5`, {
                    headers: { 'X-Auth-Token': API_KEY }
                });
                const data = await res.json();
                
                list.innerHTML = "";
                data.matches.forEach(m => {
                    const div = document.createElement('div');
                    div.className = 'match-card';
                    div.innerHTML = `
                        <span>${new Date(m.utcDate).toLocaleDateString()}</span>
                        <span>${m.homeTeam.shortName} vs ${m.awayTeam.shortName}</span>
                        <span class="score">${m.score.fullTime.home} - ${m.score.fullTime.away}</span>
                    `;
                    list.appendChild(div);
                });
            } catch (err) {
                list.innerHTML = "Erreur matchs.";
            }
        }

        init();
    </script>
</body>
</html>
