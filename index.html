<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Ligue 1 Live 2026</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #map { flex: 2; width: 100%; }
        #matchs-container { flex: 1; padding: 20px; overflow-y: auto; background: white; border-top: 4px solid #1a2a6c; }
        .match-card { border-bottom: 1px solid #eee; padding: 10px; display: flex; justify-content: space-between; }
        .score { background: #1a2a6c; color: white; padding: 2px 8px; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="map"></div>
    <div id="matchs-container">
        <h2 id="stade-nom">Sélectionnez un club</h2>
        <div id="liste-matchs">En attente de l'API...</div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const API_KEY = '42ddec7c6cd54e0786b0444e2001c25e';
        const map = L.map('map').setView([46.6, 2.2], 6);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        const STADES_GPS = {
            "Paris Saint-Germain": [48.8414, 2.2530], "Olympique de Marseille": [43.2698, 5.3959],
            "Olympique Lyonnais": [45.7653, 4.9819], "AS Monaco FC": [43.7276, 7.4155],
            "Lille OSC": [50.6119, 3.1305], "RC Lens": [50.4328, 2.8149],
            "Stade Rennais FC 1901": [48.1075, -1.7033], "OGC Nice": [43.7053, 7.1927],
            "Stade Brestois 29": [48.4030, -4.4614], "RC Strasbourg Alsace": [48.5603, 7.7546],
            "Toulouse FC": [43.5833, 1.4341], "AJ Auxerre": [47.7867, 3.5880],
            "Angers SCO": [47.4615, -0.5302], "Le Havre AC": [49.5002, 0.1701],
            "AS Saint-Étienne": [45.4608, 4.3901], "FC Nantes": [47.2561, -1.5247],
            "Stade de Reims": [49.2464, 4.0251], "Montpellier HSC": [43.6225, 3.8122]
        };

        async function init() {
            try {
                // On force la version v4 et on vérifie si la clé passe
                const response = await fetch('https://api.football-data.org/v4/competitions/FL1/teams', {
                    method: 'GET',
                    headers: { 'X-Auth-Token': API_KEY }
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.message || "Erreur inconnue");
                }

                const data = await response.json();
                document.getElementById('liste-matchs').innerHTML = "Cliquez sur un stade.";

                data.teams.forEach(team => {
                    const coords = STADES_GPS[team.name];
                    if (coords) {
                        const marker = L.marker(coords).addTo(map);
                        marker.bindPopup(`<b>${team.name}</b>`);
                        marker.on('click', () => chargerMatchs(team.id, team.name));
                    }
                });
            } catch (err) {
                document.getElementById('liste-matchs').innerHTML = `<b style="color:red">Erreur API : ${err.message}</b><br>Vérifiez que vous avez validé votre email Football-Data.`;
            }
        }

        async function chargerMatchs(id, nom) {
            document.getElementById('stade-nom').innerText = nom;
            try {
                const res = await fetch(`https://api.football-data.org/v4/teams/${id}/matches?status=FINISHED&limit=5`, {
                    headers: { 'X-Auth-Token': API_KEY }
                });
                const data = await res.json();
                let html = "";
                data.matches.forEach(m => {
                    html += `<div class="match-card">
                        <span>${new Date(m.utcDate).toLocaleDateString()}</span>
                        <span>${m.homeTeam.shortName} - ${m.awayTeam.shortName}</span>
                        <span class="score">${m.score.fullTime.home}-${m.score.fullTime.away}</span>
                    </div>`;
                });
                document.getElementById('liste-matchs').innerHTML = html || "Aucun match récent.";
            } catch (e) { console.error(e); }
        }

        init();
    </script>
</body>
</html>
